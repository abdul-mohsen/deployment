# =============================================================================
# Host nginx — shared wildcard vhost for Dokku (NGINX_MODE=behind-nginx-shared)
# =============================================================================
# One-time setup. Drop this into /etc/nginx/sites-available/ (or your equivalent)
# and symlink/include it. After this is in place, NEW TENANTS NEED NO HOST
# NGINX CHANGES — Dokku's internal nginx will route by Host header.
#
# Replace BASE_DOMAIN and DOKKU_PORT below to match your config.env.
# Replace ssl_certificate paths with your wildcard cert for *.BASE_DOMAIN.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect for every tenant subdomain
server {
    listen 80;
    listen [::]:80;
    server_name *.BASE_DOMAIN;
    return 301 https://$host$request_uri;
}

# Single TLS-terminating vhost for all tenants
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.BASE_DOMAIN;

    # Wildcard cert for *.BASE_DOMAIN (issue once via certbot/acme.sh)
    ssl_certificate     /etc/letsencrypt/live/BASE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/BASE_DOMAIN/privkey.pem;

    # Modern TLS defaults — adjust to your nginx version
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    location / {
        # Dokku container's :80 published on host as DOKKU_PORT (default 8080)
        proxy_pass         http://127.0.0.1:DOKKU_PORT;
        proxy_http_version 1.1;

        # CRITICAL: Dokku routes by Host header — must be the original $host
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # WebSocket / HTMX upgrade support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
