{{define "login.html"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in · Dokku Dashboard</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center font-sans">
  <form method="post" action="/login" class="w-full max-w-sm bg-zinc-900/60 ring-1 ring-zinc-800 rounded-2xl p-8 space-y-5">
    <div class="flex items-center gap-3">
      <span class="inline-block h-2.5 w-2.5 rounded-full
        {{if eq .Env "prod"}}bg-rose-500{{else}}bg-emerald-500{{end}}"></span>
      <h1 class="text-lg font-semibold">Dokku Dashboard</h1>
      <span class="text-xs uppercase tracking-widest px-2 py-0.5 rounded ring-1
        {{if eq .Env "prod"}}ring-rose-500/30 text-rose-400{{else}}ring-emerald-500/30 text-emerald-400{{end}}">{{.Env}}</span>
    </div>
    {{if .Error}}
      <div class="text-rose-400 text-sm">
        {{if eq .Error "invalid"}}Invalid credentials.{{end}}
        {{if eq .Error "session"}}Login succeeded but session could not be saved. Check browser cookie settings for localhost.{{end}}
      </div>
    {{end}}
    <label class="block">
      <span class="text-xs text-zinc-400 uppercase tracking-widest">User</span>
      <input name="user" required autofocus
             class="mt-1 w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 focus:border-emerald-500 focus:outline-none">
    </label>
    <label class="block">
      <span class="text-xs text-zinc-400 uppercase tracking-widest">Password</span>
      <input type="password" name="pass" required
             class="mt-1 w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 focus:border-emerald-500 focus:outline-none">
    </label>
    <button class="w-full bg-emerald-500 text-zinc-950 font-semibold rounded-lg py-2 hover:bg-emerald-400">
      Sign in
    </button>
  </form>
</body>
</html>{{end}}
