# =============================================================================
# Frontend CI/CD — build & push image; trigger dev auto-deploy via webhook
# =============================================================================
# Place at .github/workflows/deploy.yml in the FRONTEND repo.
#
# Branch → tag mapping:
#   dev  → :dev    (auto-deployed to the dev tenant by auto-pull.sh)
#   main → :latest (NOT auto-deployed; ops runs deploy-all.sh manually per client)
#   any  → :<sha>  (immutable reference)
# =============================================================================

name: Build & Push Frontend

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Ping dev webhook (best effort)
        env:
          URL: ${{ secrets.WEBHOOK_URL_DEV }}
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "No webhook configured — server cron will pull within ~2 min."
            exit 0
          fi
          curl -sfk -X POST "$URL" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d '{"type":"frontend","image":"${{ env.IMAGE_NAME }}:dev"}' \
            --max-time 10 || echo "Webhook failed — falling back to cron polling."
