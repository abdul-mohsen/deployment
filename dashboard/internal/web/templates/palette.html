{{define "palette.html"}}
<div id="palette" class="hidden fixed inset-0 z-50 bg-zinc-950/70 backdrop-blur-sm">
  <div class="max-w-xl mx-auto mt-32 bg-zinc-900 ring-1 ring-zinc-700 rounded-xl shadow-2xl overflow-hidden">
    <input id="palette-input" placeholder="Jump to app, run command…" autocomplete="off"
           class="w-full bg-transparent border-b border-zinc-800 px-4 py-3 outline-none text-sm">
    <ul id="palette-list" class="max-h-80 overflow-y-auto text-sm divide-y divide-zinc-800/60"></ul>
    <div class="px-4 py-2 text-[10px] text-zinc-500 flex justify-between">
      <span>↑↓ navigate · ⏎ open · esc close</span>
      <span>type <code>&gt;</code> for commands</span>
    </div>
  </div>
</div>
{{end}}
